services:
  - type: web
    name: jkuat-queue
    runtime: node
    buildCommand: npm ci && npm run build && npm run migrate:prod && npm run init-data:prod
    startCommand: node api-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jkuat-queue-db
          property: connectionString
      - key: PORT
        value: "3000"
